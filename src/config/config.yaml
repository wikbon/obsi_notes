# Obsidian vault configuration
# Paths can be overridden via environment variables (see .env.example)
vault:
  path: ""  # Set OBSIDIAN_VAULT_PATH env var
  default_note_extension: ".md"

# Processing configuration
processing:
  output_dir: ""  # Set OBSIDIAN_OUTPUT_DIR env var (default: vault_path/processed)
  json_extension: ".json"

# File handling settings
files:
  ignore_patterns:
    - ".git"
    - ".obsidian"
    - ".trash"
    - ".DS_Store"
  supported_extensions:
    - ".md"
    - ".markdown"
    - ".txt"
    - ".srt"

# OpenAI settings (used by OpenAI handler)
openai:
  default_model: "gpt-5.2-latest"
  temperature: 0.7
  max_output_tokens: 4096
  instructions: "You are a helpful assistant specialized in processing and analyzing notes."

# Local LLM settings (used by DeepSeek/LMStudio handlers)
local_llm:
  temperature: 0.6
  max_tokens: 4096
  n_ctx: 8192

# LM Studio settings
lmstudio:
  base_url: ""  # Set LMSTUDIO_BASE_URL env var (default: http://127.0.0.1:1234/v1)
  model_id: ""  # Set LMSTUDIO_MODEL_ID env var

# Model configurations for llama-cpp-python
# Paths should be set via env vars: DEEPSEEK_LLAMA_8B_PATH, DEEPSEEK_QWEN_32B_PATH, DEEPSEEK_LLAMA_70B_PATH
models:
  DeepSeek-Llama-8B:
    path: ""
    n_gpu_layers: -1
    n_ctx: 8192
  DeepSeek-Qwen-32B:
    path: ""
    n_gpu_layers: 15
    n_ctx: 8192
  DeepSeek-Llama-70B:
    path: ""
    n_gpu_layers: 10
    n_ctx: 8192
