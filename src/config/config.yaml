# Obsidian vault configuration
vault:
  path: "/path/to/your/obsidian/vault"
  default_note_extension: ".md"

# Processing configuration
processing:
  output_dir: "/path/to/your/obsidian/vault/processed"
  json_extension: ".json"

# File handling settings
files:
  ignore_patterns:
    - ".git"
    - ".obsidian"
    - ".trash"
    - ".DS_Store"
  supported_extensions:
    - ".md"
    - ".markdown"
    - ".txt"
    - ".srt"

# OpenAI settings (used by OpenAI handler)
openai:
  default_model: "gpt-5.2-latest"
  temperature: 0.7
  max_output_tokens: 4096
  instructions: "You are a helpful assistant specialized in processing and analyzing notes."

# Local LLM settings (used by DeepSeek/LMStudio handlers)
local_llm:
  temperature: 0.6
  max_tokens: 4096
  n_ctx: 8192

# Model configurations for llama-cpp-python
models:
  DeepSeek-Llama-8B:
    path: "/path/to/DeepSeek-R1-Distill-Llama-8B-Q8_0.gguf"
    n_gpu_layers: -1
    n_ctx: 8192
  DeepSeek-Qwen-32B:
    path: "/path/to/DeepSeek-R1-Distill-Qwen-32B-Q6_K_L.gguf"
    n_gpu_layers: 15
    n_ctx: 8192
  DeepSeek-Llama-70B:
    path: "/path/to/DeepSeek-R1-Distill-Llama-70B.gguf"
    n_gpu_layers: 10
    n_ctx: 8192
